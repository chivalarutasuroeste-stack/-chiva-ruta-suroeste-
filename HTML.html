<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chiva: La Ruta Suroeste</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;background:#fff;color:#1a1a1a;overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* Header */
#hdr{height:54px;background:#fff;border-bottom:3px solid #2563EB;display:flex;align-items:center;padding:0 20px;gap:12px;position:sticky;top:0;z-index:200;box-shadow:0 2px 10px rgba(37,99,235,.08)}
.logo{font-size:16px;font-weight:900;color:#1a1a1a;white-space:nowrap}
.logo em{color:#2563EB;font-style:normal}
.tagline{font-size:11px;color:#9ca3af;border-left:1px solid #e5e7eb;padding-left:12px;line-height:1.3}
.hdr-r{margin-left:auto;display:flex;align-items:center;gap:14px}
.hdr-stat{text-align:right}
.hdr-n{font-size:16px;font-weight:800;color:#2563EB;display:block;line-height:1}
.hdr-l{font-size:9px;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em}
#btn-reset{padding:5px 12px;border:1px solid #d1d5db;border-radius:20px;font-size:11px;font-weight:600;color:#6b7280;background:#fff;display:none;transition:all .15s}
#btn-reset:hover{border-color:#2563EB;color:#2563EB}
#btn-reset.vis{display:block}

/* Shell - 3 columnas */
#shell{display:grid;grid-template-columns:340px 1fr 1fr;height:calc(100vh - 54px)}

/* Mapa col */
#mcol{border-right:1px solid #e5e7eb;display:flex;flex-direction:column;background:#f8fafc;overflow:hidden}
#mwrap{flex:1;position:relative;padding:14px 10px 6px;min-height:0}
#msvg{width:100%;height:100%}
#tip{position:absolute;pointer-events:none;z-index:50;background:#1a1a1a;color:#fff;font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px;opacity:0;transition:opacity .1s;white-space:nowrap}
path.muni{cursor:pointer;stroke:#fff;stroke-width:.9px;stroke-linejoin:round;transition:filter .18s}
path.muni:hover{filter:brightness(1.15) drop-shadow(0 1px 5px rgba(0,0,0,.15))}
path.muni.activo{stroke:#1a1a1a;stroke-width:2.2px;filter:brightness(1.06)}
path.muni.dim{opacity:.22;pointer-events:none}
text.lbl{font-size:7px;fill:rgba(255,255,255,.85);pointer-events:none;text-anchor:middle;dominant-baseline:middle;font-weight:500}
circle.cnt-bg{fill:rgba(0,0,0,.32);pointer-events:none}
text.cnt-n{font-size:8px;fill:#fff;font-weight:800;pointer-events:none;text-anchor:middle;dominant-baseline:middle}

/* Zona bar */
#zbar{display:flex;gap:4px;padding:6px 10px;border-top:1px solid #e5e7eb;background:#fff}
.zb{flex:1;padding:5px 2px;font-size:10px;font-weight:700;background:#f9fafb;color:#9ca3af;border:1px solid #e5e7eb;border-radius:6px;text-align:center;transition:all .15s}
.zb:hover{color:#374151;border-color:#9ca3af}
.zb.on{background:#2563EB;color:#fff;border-color:#2563EB}

/* Leyenda */
#ley{padding:7px 10px 9px;border-top:1px solid #e5e7eb;background:#fff;display:flex;flex-wrap:wrap;gap:5px 12px}
.li{display:flex;align-items:center;gap:5px;font-size:10px;color:#6b7280}
.lsq{width:11px;height:11px;border-radius:3px;flex-shrink:0}

/* Panel col */
.pcol{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid #e5e7eb}
.pcol:last-child{border-right:none}
.ptop{padding:12px 16px 10px;border-bottom:1px solid #e5e7eb;flex-shrink:0;background:#fff}
.sw{position:relative;margin-bottom:9px}
.srch{width:100%;padding:9px 36px 9px 13px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;font-size:14px;color:#1a1a1a;outline:none;transition:border-color .15s}
.srch:focus{border-color:#2563EB;background:#fff}
.srch::placeholder{color:#9ca3af}
.si{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:#9ca3af;font-size:16px;pointer-events:none}
.chips{display:flex;flex-wrap:wrap;gap:4px}
.chip{padding:3px 10px;font-size:11px;font-weight:500;background:#f9fafb;border:1px solid #e5e7eb;border-radius:20px;color:#6b7280;transition:all .15s;white-space:nowrap}
.chip:hover{border-color:#2563EB;color:#2563EB}
.chip.on{background:#EFF6FF;border-color:#93C5FD;color:#1D4ED8}
.cbar{padding:6px 16px;border-bottom:1px solid #f3f4f6;font-size:11px;color:#9ca3af;flex-shrink:0;display:flex;justify-content:space-between;align-items:center}
.cbar strong{color:#2563EB}
.lista{flex:1;overflow-y:auto;padding:8px 12px 24px}
.lista::-webkit-scrollbar{width:4px}
.lista::-webkit-scrollbar-thumb{background:#e5e7eb;border-radius:2px}

/* Panel headers */
.panel-header{display:flex;justify-content:space-between;align-items:center;padding:6px 16px;border-bottom:1px solid #f3f4f6;flex-shrink:0}
.panel-header .panel-title{font-size:12px;font-weight:700;color:#374151}
.panel-header .panel-badge{font-size:10px;color:#2563EB;background:#EFF6FF;padding:2px 10px;border-radius:12px}

/* Cards simplificadas */
.card{border:1px solid #f3f4f6;border-radius:12px;padding:10px 12px;margin-bottom:6px;cursor:pointer;background:#fff;transition:border-color .15s,box-shadow .15s;animation:fu .2s ease both}
.card:hover{border-color:#d1d5db;box-shadow:0 1px 6px rgba(0,0,0,.05)}
.card.open{border-color:#2563EB;box-shadow:0 2px 10px rgba(37,99,235,.1)}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.ct{display:flex;align-items:flex-start;gap:8px}
.cico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.cbody{flex:1;min-width:0}
.cnom{font-size:13px;font-weight:700;color:#111827;line-height:1.2}
.cmeta{font-size:10px;color:#9ca3af;display:flex;flex-wrap:wrap;gap:2px 6px;margin-top:1px}
.ctags{display:flex;flex-wrap:wrap;gap:2px;margin-top:3px}
.tag{font-size:9px;padding:1px 6px;border-radius:12px;background:#f3f4f6;border:1px solid #e5e7eb;color:#6b7280}
.carr{width:20px;height:20px;border-radius:5px;border:1px solid #e5e7eb;background:#f9fafb;color:#9ca3af;font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .2s}
.card.open .carr{transform:rotate(180deg);border-color:#2563EB;color:#2563EB}
.det{display:none;margin-top:8px;padding-top:8px;border-top:1px solid #f3f4f6}
.card.open .det{display:block}
.det .btn-ver{width:100%;padding:7px;border-radius:8px;font-size:11px;font-weight:700;text-align:center;border:1px solid #DBEAFE;background:#EFF6FF;color:#1D4ED8;transition:all .15s}
.det .btn-ver:hover{background:#DBEAFE}
.det .btn-ver.verde{background:#F0FDF4;color:#065F46;border-color:#D1FAE5}
.det .btn-ver.verde:hover{background:#DCFCE7}
.empty{text-align:center;padding:50px 20px;color:#9ca3af;font-size:13px;line-height:1.7}

/* Card de municipio (para el panel derecho) */
.card-muni{border:1px solid #e5e7eb;border-radius:12px;padding:14px 16px;margin-bottom:6px;cursor:pointer;background:#fff;transition:all .15s;animation:fu .2s ease both;display:flex;align-items:center;justify-content:space-between}
.card-muni:hover{border-color:#2563EB;box-shadow:0 1px 6px rgba(37,99,235,.1)}
.card-muni .muni-nom{font-size:14px;font-weight:700;color:#111827}
.card-muni .muni-prov{font-size:10px;color:#9ca3af;margin-top:2px}
.card-muni .muni-badge{font-size:10px;font-weight:600;padding:3px 10px;border-radius:12px;background:#EFF6FF;color:#2563EB}
.card-muni .muni-arrow{color:#9ca3af;font-size:14px}

/* Modal - sin tabs */
#modal{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:16px}
#modal.on{display:flex}
#mbox{background:#fff;border-radius:20px;border:1px solid #e5e7eb;width:100%;max-width:680px;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 24px 70px rgba(0,0,0,.18)}

/* Modal header */
#mhd{flex-shrink:0;display:flex;align-items:flex-start;gap:12px;padding:16px 20px 12px;border-bottom:1px solid #f3f4f6}
#mico{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
#mwrp{flex:1;min-width:0}
#mnom{font-size:18px;font-weight:800;color:#111827;line-height:1.15}
#mbgs{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.mbg{font-size:10px;font-weight:600;padding:2px 10px;border-radius:16px}
#mcls{width:30px;height:30px;border-radius:8px;border:1px solid #e5e7eb;background:#f9fafb;color:#9ca3af;font-size:17px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
#mcls:hover{border-color:#2563EB;color:#2563EB}

/* Modal body */
#mbody{flex:1;overflow-y:auto;padding:16px 20px 24px}
#mbody::-webkit-scrollbar{width:3px}
#mbody::-webkit-scrollbar-thumb{background:#e5e7eb}

/* Estilos para LQE */
.sec-hdr{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:#374151;margin:0 0 10px;padding-bottom:6px;border-bottom:2px solid #e5e7eb}

.lqe-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.lqe-card{background:#f8fafc;border:1px solid #e5e7eb;border-radius:10px;padding:10px 12px}
.lqe-card-title{font-size:11px;font-weight:700;color:#374151;display:flex;align-items:center;gap:5px;margin-bottom:5px}
.lqe-card-title .lqe-icon{font-size:13px}
.lqe-items{display:flex;flex-wrap:wrap;gap:3px}
.lqe-item{font-size:10px;color:#4b5563;background:#fff;padding:2px 8px;border-radius:5px;border:1px solid #e5e7eb}
.lqe-empty{font-size:11px;color:#9ca3af;font-style:italic}

.no-lqe{font-size:13px;color:#9ca3af;font-style:italic;padding:12px;background:#f9fafb;border-radius:10px;text-align:center;border:1px dashed #e5e7eb}

/* Perfil en modal */
.mg{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.mc{background:#f9fafb;border-radius:8px;padding:8px 10px}
.mlbl{font-size:8px;color:#9ca3af;text-transform:uppercase;letter-spacing:.06em}
.mval{font-size:12px;color:#374151;line-height:1.3}
.mb{background:#f9fafb;border-radius:8px;padding:8px 10px;margin-bottom:6px}
.mq{font-size:12px;color:#6b7280;line-height:1.5;font-style:italic;border-left:2px solid #2563EB;padding-left:8px;margin-top:3px}
.mcont{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.mcb{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:8px;font-size:11px;font-weight:500;border:1px solid #e5e7eb;background:#f9fafb;color:#6b7280;text-decoration:none;transition:all .15s}
.mcb:hover{background:#EFF6FF;border-color:#93C5FD;color:#1D4ED8}
.mcb.wa{border-color:#d1fae5;background:#f0fdf4;color:#065f46}
.mcb.wa:hover{background:#dcfce7}
#mmapabox{width:100%;height:120px;background:#EFF6FF;border:1px solid #DBEAFE;border-radius:10px;overflow:hidden;margin-bottom:12px;display:flex;align-items:center;justify-content:center}
#mmapabox svg{width:100%;height:100%}

/* Divisor */
.divider{height:1px;background:#e5e7eb;margin:14px 0}

/* Responsive */
@media(max-width:1100px){
  #shell{grid-template-columns:280px 1fr}
  .pcol:last-child{display:none}
}
@media(max-width:700px){
  body{overflow:auto}
  #shell{grid-template-columns:1fr;height:auto}
  #mcol{height:320px;border-right:none;border-bottom:1px solid #e5e7eb}
  .pcol{overflow:visible;min-height:300px;border-right:none}
  .lista{overflow:visible}
  .tagline{display:none}
  #mbox{max-width:100%;border-radius:14px;max-height:95vh}
  .mg,.lqe-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div id="hdr">
  <span class="logo">🚌 <em>Chiva:</em> La Ruta Suroeste</span>
  <span class="tagline">Iniciativas juveniles · Suroeste Antioqueño</span>
  <div class="hdr-r">
    <button id="btn-reset" onclick="resetAll()">✕ Limpiar</button>
    <div class="hdr-stat"><span class="hdr-n" id="sn">0</span><span class="hdr-l">iniciativas</span></div>
    <div class="hdr-stat"><span class="hdr-n" id="sm">0</span><span class="hdr-l">municipios</span></div>
  </div>
</div>

<div id="shell">
  <!-- Columna 1: Mapa -->
  <div id="mcol">
    <div id="mwrap">
      <div id="tip"></div>
      <svg id="msvg" preserveAspectRatio="xMidYMid meet"></svg>
    </div>
    <div id="zbar">
      <button class="zb on" data-z="Todos">Todos</button>
      <button class="zb" data-z="Urbana">Urbana</button>
      <button class="zb" data-z="Rural">Rural</button>
      <button class="zb" data-z="Mixta">Mixta</button>
    </div>
    <div id="ley">
      <div class="li"><div class="lsq" style="background:linear-gradient(90deg,#1D4ED8,#60A5FA)"></div>Provincia Cartama</div>
      <div class="li"><div class="lsq" style="background:linear-gradient(90deg,#047857,#34D399)"></div>Provincia San Juan</div>
      <div class="li"><div class="lsq" style="background:linear-gradient(90deg,#991B1B,#F87171)"></div>Prov. Penderisco-Sinifaná</div>
    </div>
  </div>

  <!-- Columna 2: Listado de perfiles -->
  <div class="pcol" id="pcol-perfil">
    <div class="ptop">
      <div class="sw"><input class="srch" id="srch-perfil" type="text" placeholder="Buscar perfiles…" autocomplete="off"><span class="si">⌕</span></div>
      <div class="chips" id="chips-perfil"></div>
    </div>
    <div class="panel-header">
      <span class="panel-title">📋 Perfiles</span>
      <span class="panel-badge" id="badge-perfil">0</span>
    </div>
    <div class="cbar"><span id="ctxt-perfil">Cargando…</span></div>
    <div class="lista" id="lista-perfil"></div>
  </div>

  <!-- Columna 3: Municipios (Lo que ya existe) -->
  <div class="pcol" id="pcol-lqe">
    <div class="ptop">
      <div class="sw"><input class="srch" id="srch-lqe" type="text" placeholder="Buscar municipio…" autocomplete="off"><span class="si">⌕</span></div>
    </div>
    <div class="panel-header">
      <span class="panel-title">🗂️ Lo que ya existe</span>
      <span class="panel-badge" id="badge-lqe">0</span>
    </div>
    <div class="cbar"><span id="ctxt-lqe">Municipios con información</span></div>
    <div class="lista" id="lista-lqe"></div>
  </div>
</div>

<div id="modal">
  <div id="mbox">
    <div id="mhd">
      <div id="mico"></div>
      <div id="mwrp"><div id="mnom"></div><div id="mbgs"></div></div>
      <button id="mcls" onclick="cerrar()">✕</button>
    </div>
    <div id="mbody"></div>
  </div>
</div>

const AC     = {"Arte y cultura": "#7C3AED", "Medio ambiente y sostenibilidad": "#059669", "Emprendimiento y economía local": "#D97706", "Política y participación ciudadana": "#DC2626", "Enfoque de género y diversidad": "#DB2777", "Deporte y recreación": "#2563EB", "Apropiación de territorio natural": "#0891B2", "Saberes ancestrales": "#92400E"};

const ZONA_COL = {Urbana:"#2563EB",Rural:"#059669",Mixta:"#D97706"};
const LSHORT   = {"Ciudad Bolívar":"C.Bolívar","Santa Bárbara":"Sta.Bárbara","Angelópolis":"Angelóp.","Pueblorrico":"Pueblorr."};

let fMun=null, fZona="Todos", fAreas=new Set(), query="", queryLQE="", cardOpen=null, pathAct=null, curIni=null;

/* ── Mapa ── */
const svgD3 = d3.select("#msvg");
const tipEl = document.getElementById("tip");
const mWrap = document.getElementById("mwrap");
const W=340, H=440;
svgD3.attr("viewBox",`0 0 ${W} ${H}`);
const proj = d3.geoMercator().fitSize([W,H],GEO);
const pFn  = d3.geoPath().projection(proj);

const cMun = {};
INIX.forEach(i => cMun[i.municipio]=(cMun[i.municipio]||0)+1);

// Municipios con LQE
const munConLQE = Object.keys(LQE);

svgD3.selectAll("path.muni")
  .data(GEO.features).enter().append("path")
  .attr("class","muni")
  .attr("d",pFn)
  .attr("fill",d=>(PROV[d.properties.nombre]||{c:"#9ca3af"}).c)
  .on("mousemove",function(ev,d){
    const [mx,my]=d3.pointer(ev,mWrap);
    const c=cMun[d.properties.nombre]||0;
    tipEl.style.opacity="1";
    tipEl.style.left=(mx+14)+"px"; tipEl.style.top=(my-12)+"px";
    const tiene = munConLQE.includes(d.properties.nombre) ? " 📋" : "";
    tipEl.textContent=d.properties.nombre+(c?" · "+c+" iniciativa"+(c!==1?"s":""):"")+tiene;
  })
  .on("mouseleave",()=>tipEl.style.opacity="0")
  .on("click",function(ev,d){
    tipEl.style.opacity="0";
    const n=d.properties.nombre;
    if(fMun===n){
      fMun=null;
      svgD3.selectAll("path.muni").classed("dim",false).classed("activo",false);
      pathAct=null;
    } else {
      fMun=n;
      if(pathAct) d3.select(pathAct).classed("activo",false);
      d3.select(this).classed("activo",true); pathAct=this;
      svgD3.selectAll("path.muni").classed("dim",dd=>dd.properties.nombre!==n);
      d3.select(this).classed("dim",false);
    }
    updReset(); render();
  });

GEO.features.forEach(f=>{
  const nm=f.properties.nombre, c=pFn.centroid(f), cnt=cMun[nm]||0;
  if(!c||isNaN(c[0])) return;
  svgD3.append("text").attr("class","lbl").attr("x",c[0]).attr("y",c[1]+(cnt?7:0)).text(LSHORT[nm]||nm);
  if(cnt){
    svgD3.append("circle").attr("class","cnt-bg").attr("cx",c[0]).attr("cy",c[1]-7).attr("r",9);
    svgD3.append("text").attr("class","cnt-n").attr("cx",c[0]).attr("cy",c[1]-7).text(cnt);
  }
});

/* ── Zona ── */
document.querySelectorAll(".zb").forEach(b=>b.addEventListener("click",()=>{
  document.querySelectorAll(".zb").forEach(x=>x.classList.remove("on"));
  b.classList.add("on"); fZona=b.dataset.z; updReset(); render();
}));

/* ── Chips ── */
const allAreas=[...new Set(INIX.flatMap(i=>i.areas))].sort();

function setupChips(containerId) {
  const container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = '';
  allAreas.forEach(a=>{
    const b=document.createElement("button"); b.className="chip"; b.dataset.a=a;
    b.textContent=(AI[a]||"•")+" "+a;
    b.addEventListener("click",()=>{
      if(fAreas.has(a)) fAreas.delete(a); else fAreas.add(a);
      b.classList.toggle("on",fAreas.has(a)); updReset(); render();
    });
    container.appendChild(b);
  });
}
setupChips("chips-perfil");

/* ── Search ── */
document.getElementById("srch-perfil").addEventListener("input",e=>{
  query=e.target.value.toLowerCase(); updReset(); render();
});
document.getElementById("srch-lqe").addEventListener("input",e=>{
  queryLQE=e.target.value.toLowerCase(); renderLQE();
});

/* ── Reset ── */
function updReset(){
  const d=fMun||fZona!=="Todos"||fAreas.size>0||query;
  document.getElementById("btn-reset").classList.toggle("vis",!!d);
}
window.resetAll=function(){
  fMun=null; fZona="Todos"; fAreas.clear(); query=""; queryLQE="";
  document.getElementById("srch-perfil").value="";
  document.getElementById("srch-lqe").value="";
  document.querySelectorAll(".zb").forEach(b=>b.classList.toggle("on",b.dataset.z==="Todos"));
  document.querySelectorAll(".chip").forEach(b=>b.classList.remove("on"));
  svgD3.selectAll("path.muni").classed("dim",false).classed("activo",false);
  pathAct=null; updReset(); render();
};

function getFilteredData() {
  return INIX.filter(i=>{
    if(fMun&&i.municipio!==fMun) return false;
    if(fZona!=="Todos"&&i.zona!==fZona) return false;
    if(fAreas.size>0&&!i.areas.some(a=>fAreas.has(a))) return false;
    if(query){const h=(i.nombre+i.municipio+i.contacto+i.areas.join(" ")+i.lugar).toLowerCase(); if(!h.includes(query)) return false;}
    return true;
  });
}

/* ── Render ── */
function render(){
  const filt = getFilteredData();
  const munis = new Set(filt.map(i=>i.municipio));
  document.getElementById("sn").textContent=filt.length;
  document.getElementById("sm").textContent=munis.size;
  
  renderPerfiles("lista-perfil", "ctxt-perfil", "badge-perfil", filt);
  renderLQE();
}

/* ── Panel de Perfiles ── */
function renderPerfiles(listaId, ctxtId, badgeId, data) {
  const lista = document.getElementById(listaId);
  const badge = document.getElementById(badgeId);
  const ctxt = document.getElementById(ctxtId);
  
  badge.textContent = data.length;
  ctxt.innerHTML = `<strong>${data.length}</strong> de ${INIX.length} iniciativas`;
  
  if(!data.length){
    lista.innerHTML=`<div class="empty">Sin resultados.<br>Intenta otros filtros.</div>`;
    return;
  }
  lista.innerHTML="";
  data.forEach((ini,idx)=>{
    const mc=AC[ini.areas[0]]||"#6b7280";
    const div=document.createElement("div");
    div.className="card"; div.style.animationDelay=(idx*18)+"ms";
    const zc=ZONA_COL[ini.zona]||"#9ca3af";
    const tl=ini.tipo==="Líder"
      ?`<span style="color:#DB2777;font-size:9px;font-weight:600">👤</span>`
      :`<span style="color:#2563EB;font-size:9px;font-weight:600">🤝</span>`;

    div.innerHTML=`
      <div class="ct">
        <div class="cico" style="background:${mc}18">${AI[ini.areas[0]]||"●"}</div>
        <div class="cbody">
          <div class="cnom">${ini.nombre}</div>
          <div class="cmeta">${tl}<span>📍 ${ini.municipio}</span><span style="color:${zc}">⬤ ${ini.zona}</span></div>
          <div class="ctags">${ini.areas.slice(0,3).map(a=>`<span class="tag">${AI[a]||"•"} ${a}</span>`).join("")}${ini.areas.length>3?`<span class="tag">+${ini.areas.length-3}</span>`:""}</div>
        </div>
        <div class="carr">▾</div>
      </div>
      <div class="det">
        <button class="btn-ver" onclick="abrirModal(${ini.id},'perfil')">👤 Ver perfil completo</button>
      </div>`;

    div.addEventListener("click",function(e){
      if(e.target.tagName==="BUTTON"||e.target.tagName==="A"||e.target.closest("button,a")) return;
      if(cardOpen&&cardOpen!==div) cardOpen.classList.remove("open");
      div.classList.toggle("open");
      cardOpen=div.classList.contains("open")?div:null;
      if(div.classList.contains("open") && !fMun){
        svgD3.selectAll("path.muni").classed("dim",d=>d.properties.nombre!==ini.municipio);
        if(pathAct) d3.select(pathAct).classed("activo",false);
        const p=svgD3.selectAll("path.muni").filter(d=>d.properties.nombre===ini.municipio).node();
        if(p){d3.select(p).classed("activo",true);pathAct=p;}
        setTimeout(()=>div.scrollIntoView({behavior:"smooth",block:"nearest"}),60);
      } else if(!fMun){
        svgD3.selectAll("path.muni").classed("dim",false);
        if(pathAct){d3.select(pathAct).classed("activo",false);pathAct=null;}
      }
    });
    lista.appendChild(div);
  });
}

/* ── Panel de LQE - solo municipios ── */
function renderLQE() {
  const lista = document.getElementById("lista-lqe");
  const badge = document.getElementById("badge-lqe");
  const ctxt = document.getElementById("ctxt-lqe");
  
  // Obtener municipios únicos que tienen LQE
  let municipios = Object.keys(LQE);
  
  // Filtrar por búsqueda
  if(queryLQE){
    municipios = municipios.filter(m => m.toLowerCase().includes(queryLQE));
  }
  
  // Filtrar por zona si está seleccionada
  if(fZona!=="Todos"){
    municipios = municipios.filter(m => {
      const iniciativas = INIX.filter(i => i.municipio === m);
      return iniciativas.some(i => i.zona === fZona);
    });
  }
  
  // Filtrar por áreas si están seleccionadas
  if(fAreas.size>0){
    municipios = municipios.filter(m => {
      const iniciativas = INIX.filter(i => i.municipio === m);
      return iniciativas.some(i => i.areas.some(a => fAreas.has(a)));
    });
  }
  
  // Filtrar por municipio seleccionado en el mapa
  if(fMun){
    municipios = municipios.filter(m => m === fMun);
  }
  
  badge.textContent = municipios.length;
  ctxt.innerHTML = `<strong>${municipios.length}</strong> municipios con información`;
  
  if(!municipios.length){
    lista.innerHTML=`<div class="empty">No hay municipios con esta información.<br>Intenta otros filtros.</div>`;
    return;
  }
  
  lista.innerHTML="";
  municipios.forEach((mun, idx) => {
    const div = document.createElement("div");
    div.className = "card-muni";
    div.style.animationDelay = (idx*18)+"ms";
    const pInfo = PROV[mun] || {label: "Provincia", c: "#9ca3af"};
    const count = INIX.filter(i => i.municipio === mun).length;
    
    div.innerHTML = `
      <div>
        <div class="muni-nom">${mun}</div>
        <div class="muni-prov">${pInfo.label} · ${count} iniciativa${count!==1?"s":""}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="muni-badge">📋 Ver</span>
        <span class="muni-arrow">→</span>
      </div>
    `;
    
    div.addEventListener("click", function() {
      // Buscar una iniciativa de este municipio para abrir el modal con LQE
      const ini = INIX.find(i => i.municipio === mun);
      if(ini) abrirModal(ini.id, 'lqe');
    });
    
    lista.appendChild(div);
  });
}

/* ── Modal ── */
window.abrirModal=function(id,modo){
  const ini=INIX.find(i=>i.id===id); if(!ini) return;
  curIni=ini;
  
  const mc=AC[ini.areas[0]]||"#6b7280";
  const pInfo=PROV[ini.municipio]||{c:"#9ca3af",label:"—"};
  const zc=ZONA_COL[ini.zona]||"#9ca3af";
  document.getElementById("mico").style.cssText=`background:${mc}18;font-size:22px`;
  document.getElementById("mico").textContent=AI[ini.areas[0]]||"●";
  document.getElementById("mnom").textContent=modo==='lqe' ? `Lo que ya existe en ${ini.municipio}` : ini.nombre;

  const bw=document.getElementById("mbgs"); bw.innerHTML="";
  if(modo==='perfil'){
    [
      [ini.municipio,       "#EFF6FF", "#1D4ED8"],
      ["⬤ "+ini.zona,       zc+"22",   zc       ],
      [pInfo.label,         "#f0fdf4", "#065f46" ],
    ].forEach(([t,bg,col])=>{
      const s=document.createElement("span");
      s.className="mbg"; s.textContent=t;
      s.style.background=bg; s.style.color=col;
      bw.appendChild(s);
    });
  } else {
    [
      [ini.municipio,       "#EFF6FF", "#1D4ED8"],
      [pInfo.label,         "#f0fdf4", "#065f46" ],
    ].forEach(([t,bg,col])=>{
      const s=document.createElement("span");
      s.className="mbg"; s.textContent=t;
      s.style.background=bg; s.style.color=col;
      bw.appendChild(s);
    });
  }

  buildBody(ini, modo);
  document.getElementById("modal").classList.add("on");
  document.getElementById("mbody").scrollTop=0;
};

function buildMiniMap(mun){
  const feat=GEO.features.find(f=>f.properties.nombre===mun);
  const pc=(PROV[mun]||{c:"#9ca3af"}).c;
  const box=document.getElementById("mmapabox"); if(!box) return;
  box.innerHTML='<svg style="width:100%;height:100%"></svg>';
  const ns=d3.select(box.querySelector("svg"));
  if(!feat) return;
  const mp=d3.geoMercator().fitSize([480,120],{type:"FeatureCollection",features:[feat]});
  const mpFn=d3.geoPath().projection(mp);
  ns.attr("viewBox","0 0 480 120");
  const fi=ns.append("defs").append("filter").attr("id","shm").attr("x","-20%").attr("y","-20%").attr("width","140%").attr("height","140%");
  fi.append("feDropShadow").attr("dx","0").attr("dy","2").attr("stdDeviation","5").attr("flood-opacity",".12");
  ns.append("path").datum(feat).attr("d",mpFn).attr("fill",pc).attr("filter","url(#shm)").attr("stroke","#fff").attr("stroke-width","1.5").attr("stroke-linejoin","round");
  const cen=mpFn.centroid(feat);
  if(cen&&!isNaN(cen[0]))
    ns.append("text").attr("x",cen[0]).attr("y",cen[1]).attr("text-anchor","middle").attr("dominant-baseline","middle").style("font-size","12px").style("fill","rgba(255,255,255,.9)").style("font-weight","800").text(mun);
}

function buildBody(ini, modo){
  const body=document.getElementById("mbody");

  if(modo==="perfil"){
    const tel=ini.pub==="tel", pub=ini.pub!=="no";
    let cbHtml="";
    if(pub){
      if(ini.email) cbHtml+=`<a class="mcb" href="mailto:${ini.email}">✉ ${ini.email}</a>`;
      if(tel&&ini.celular&&ini.celular!=="N/A"&&ini.celular!==""){
        const num=ini.celular.replace(/[^0-9]/g,"");
        cbHtml+=`<a class="mcb wa" href="https://wa.me/57${num}" target="_blank">📱 WhatsApp ${ini.celular}</a>`;
      }
      if(ini.redes&&ini.redes!=="N/A"&&ini.redes!=="—"&&ini.redes!=="")
        cbHtml+=`<span class="mcb">@ ${ini.redes}</span>`;
    }
    body.innerHTML=`
      <div id="mmapabox"><svg style="width:100%;height:100%"></svg></div>
      <div class="mg">
        <div class="mc"><div class="mlbl">Tipo</div><div class="mval">${ini.tipo==="Líder"?"👤 Líder/a individual":"🤝 Colectivo"}</div></div>
        <div class="mc"><div class="mlbl">Año de inicio</div><div class="mval">${ini.año||"—"}</div></div>
        <div class="mc"><div class="mlbl">Integrantes</div><div class="mval">${ini.integrantes||"—"}</div></div>
        <div class="mc"><div class="mlbl">Constitución</div><div class="mval">${ini.constituida||"—"}</div></div>
        ${ini.lugar&&ini.lugar!=="—"?`<div class="mc" style="grid-column:1/-1"><div class="mlbl">Lugar de operación</div><div class="mval">${ini.lugar}</div></div>`:""}
      </div>
      <div class="mb"><div class="mlbl">Áreas temáticas</div><div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px">${ini.areas.map(a=>`<span style="font-size:10px;padding:2px 8px;border-radius:16px;background:${AC[a]||"#9ca3af"}18;border:1px solid ${AC[a]||"#e5e7eb"}44;color:${AC[a]||"#6b7280"}">${AI[a]||"•"} ${a}</span>`).join("")}</div></div>
      ${ini.desafio?`<div class="mb"><div class="mlbl">Principal desafío</div><div class="mq">${ini.desafio}</div></div>`:""}
      ${ini.simbolo?`<div class="mb"><div class="mlbl">Símbolo del Suroeste</div><div class="mq">${ini.simbolo}</div></div>`:""}
      <div class="mg">
        <div class="mc"><div class="mlbl">Interés en Chiva</div><div class="mval">${ini.chiva}</div></div>
        <div class="mc"><div class="mlbl">Acepta visita</div><div class="mval">${ini.visita}</div></div>
      </div>
      ${cbHtml?`<div class="mcont">${cbHtml}</div>`:""}`;
    buildMiniMap(ini.municipio);

  } else {
    /* ── MODO LQE: Solo LO QUE YA EXISTE ── */
    const mun = ini.municipio;
    const lqe = LQE[mun];
    let h = "";

    h += `<p class="sec-hdr">🗂️ Lo que ya existe en ${mun}</p>`;
    if(lqe){
      h += `<div class="lqe-grid">`;
      TEMAS.forEach(t=>{
        const items = lqe[t.key] || [];
        h += `<div class="lqe-card">
          <div class="lqe-card-title"><span class="lqe-icon">${t.icon}</span> ${t.key}</div>
          <div class="lqe-items">`;
        if(items.length){
          items.forEach(it => h += `<span class="lqe-item">${it}</span>`);
        } else {
          h += `<span class="lqe-empty">Sin información</span>`;
        }
        h += `</div></div>`;
      });
      h += `</div>`;
    } else {
      h += `<p class="no-lqe">La información de "Lo que ya existe" para <strong>${mun}</strong> será añadida próximamente.</p>`;
    }

    body.innerHTML = h;
  }
}

window.cerrar=function(){document.getElementById("modal").classList.remove("on");curIni=null;};
document.getElementById("modal").addEventListener("click",e=>{if(e.target.id==="modal")cerrar();});
document.addEventListener("keydown",e=>{if(e.key==="Escape")cerrar();});

render();
</script>
</body>
</html>
